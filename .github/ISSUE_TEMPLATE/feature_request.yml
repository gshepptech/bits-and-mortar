name: 💡 Feature request
description: Suggest an improvement or a new tool for the crew
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Got an idea to make the crew sharper? Lay it out below.
  - type: dropdown
    id: plugin
    attributes:
      label: Which crew member (or a new one)?
      options:
        - drew
        - mason
        - bob
        - gus
        - dusty
        - tess
        - riggs
        - marlowe
        - a new plugin
        - the marketplace itself
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
