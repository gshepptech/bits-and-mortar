<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" role="img" aria-label="Bits &amp; Mortar — a crew of AI builders for Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.12" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="200" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="200" rx="20" fill="url(#glow)"/>

  <!-- 8-tile plugin grid mark (2 rows x 4) -->
  <g transform="translate(52,58)" fill="#ffffff">
    <rect x="0"  y="0"  width="19" height="19" rx="4" opacity="0.95"/>
    <rect x="25" y="0"  width="19" height="19" rx="4" opacity="0.78"/>
    <rect x="50" y="0"  width="19" height="19" rx="4" opacity="0.78"/>
    <rect x="75" y="0"  width="19" height="19" rx="4" opacity="0.62"/>
    <rect x="0"  y="25" width="19" height="19" rx="4" opacity="0.78"/>
    <rect x="25" y="25" width="19" height="19" rx="4" opacity="0.62"/>
    <rect x="50" y="25" width="19" height="19" rx="4" opacity="0.62"/>
    <rect x="75" y="25" width="19" height="19" rx="4" opacity="0.5"/>
  </g>

  <text x="166" y="86" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff" letter-spacing="-1">Bits &amp; Mortar</text>
  <text x="168" y="124" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#ffffff" opacity="0.97">Drew draws it. Mason builds it. Bob keeps Claude honest.</text>
  <rect x="168" y="142" width="566" height="28" rx="14" fill="#ffffff" opacity="0.16"/>
  <text x="184" y="161" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#ffffff" opacity="0.95">A crew of 8 AI builders for Claude Code · spec → build → verify → ship</text>
</svg>
